<!DOCTYPE html>
<html lang="zh-Hant" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>我的工具｜laicw</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧰</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Bootstrap 為基底，只留 iframe 版面與細節微調 */
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    header { padding-top: env(safe-area-inset-top); }
    nav.tools { scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    nav.tools::-webkit-scrollbar { display: none; }
    .nav-pills .nav-link { white-space: nowrap; }
    main { flex: 1 1 auto; position: relative; background: #fff; }
    .frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: none; background: #fff; }
    .frame.active { display: block; }
    .ext-panel { align-items: center; justify-content: center; text-align: center; background: var(--bs-body-bg); }
    .ext-panel.active { display: flex; }
    .loader { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      background: var(--bs-body-bg); flex-direction: column; gap: 12px; z-index: 5; }
    .loader.show { display: flex; }
  </style>
</head>
<body>
  <header class="border-bottom bg-body-tertiary">
    <div class="d-flex align-items-center gap-2 px-3 pt-2 pb-1">
      <span style="font-size:18px">🧰</span>
      <h1 class="h6 mb-0 fw-semibold">我的工具</h1>
      <span class="text-secondary small">· laicw</span>
    </div>
    <nav id="nav" class="tools nav nav-pills flex-nowrap gap-2 overflow-x-auto px-3 pb-2"></nav>
  </header>

  <main id="main">
    <div class="loader" id="loader">
      <div class="spinner-border text-primary" role="status"><span class="visually-hidden">載入中…</span></div>
      <div class="text-secondary small">載入中…</div>
      <a id="loaderLink" class="link-primary small text-decoration-none" href="#" target="_blank" rel="noopener">在新分頁開啟 ↗</a>
    </div>
  </main>

  <script>
    const TOOLS = [
      { id:'bank',      emoji:'🏦', label:'銀行追蹤器', url:'https://laicw.github.io/bank-tracker/' },
      { id:'futures',   emoji:'📊', label:'微台指儀表板', url:'https://laicw.github.io/intraday-futures-monitor/' },
      { id:'portfolio', emoji:'📈', label:'台股投組',   url:'https://laicw.github.io/twstock-portfolio/' },
      // Ghostfolio 需自架後端，且會擋 iframe → external:true（開新分頁）。
      { id:'ghostfolio', emoji:'🤍', label:'Ghostfolio', url:'http://192.168.1.102:3333', external:true },
    ];

    const nav = document.getElementById('nav');
    const main = document.getElementById('main');
    const loader = document.getElementById('loader');
    const loaderLink = document.getElementById('loaderLink');
    const loaded = {};

    TOOLS.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'nav-link d-flex align-items-center gap-2';
      btn.type = 'button';
      btn.id = 'tab-' + t.id;
      btn.innerHTML = `<span>${t.emoji}</span>${t.label}`;
      btn.onclick = () => activate(t.id);
      nav.appendChild(btn);
    });

    function activate(id){
      const tool = TOOLS.find(t => t.id === id);
      if(!tool) return;

      // tabs
      document.querySelectorAll('#nav .nav-link').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + id).classList.add('active');

      // 外部工具（需自架後端、會擋 iframe）：顯示開新分頁面板，不建立 iframe
      if(tool.external){
        document.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));
        loader.classList.remove('show');
        let panel = document.getElementById('ext-' + id);
        if(!panel){
          panel = document.createElement('div');
          panel.className = 'frame ext-panel';
          panel.id = 'ext-' + id;
          panel.innerHTML =
            '<div class="card text-center mx-3" style="max-width:420px">' +
            '<div class="card-body p-4">' +
            '<div style="font-size:48px">' + tool.emoji + '</div>' +
            '<h2 class="h5 card-title mt-2">' + tool.label + '</h2>' +
            '<p class="card-text text-secondary small">此工具有自己的後端伺服器，無法內嵌於此頁，請在新分頁開啟。</p>' +
            '<a class="btn btn-primary rounded-pill px-4" href="' + tool.url + '" target="_blank" rel="noopener">開啟 ' + tool.label + ' ↗</a>' +
            '<div class="text-secondary small mt-3 text-break">' + tool.url + '</div>' +
            '</div></div>';
          main.appendChild(panel);
        }
        panel.classList.add('active');
        try{ localStorage.setItem('lastTool', id); }catch(e){}
        if(history.replaceState) history.replaceState(null,'','#'+id);
        return;
      }

      // lazy-create iframe once, keep it alive afterwards
      let frame = document.getElementById('frame-' + id);
      if(!frame){
        frame = document.createElement('iframe');
        frame.className = 'frame';
        frame.id = 'frame-' + id;
        frame.src = tool.url;
        frame.addEventListener('load', () => { loaded[id] = true; hideLoaderIf(id); });
        main.appendChild(frame);
      }

      // show only the active frame
      document.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));
      frame.classList.add('active');

      // loader handling
      loaderLink.href = tool.url;
      if(loaded[id]) loader.classList.remove('show');
      else loader.classList.add('show');

      try{ localStorage.setItem('lastTool', id); }catch(e){}
      if(history.replaceState) history.replaceState(null,'','#'+id);
    }

    function hideLoaderIf(id){
      const active = document.querySelector('#nav .nav-link.active');
      if(active && active.id === 'tab-' + id) loader.classList.remove('show');
    }

    // initial tab: URL hash > last used > first
    const fromHash = location.hash.replace('#','');
    let start = TOOLS.some(t=>t.id===fromHash) ? fromHash : null;
    if(!start){ try{ start = localStorage.getItem('lastTool'); }catch(e){} }
    if(!TOOLS.some(t=>t.id===start)) start = TOOLS[0].id;
    activate(start);
  </script>
</body>
</html>
